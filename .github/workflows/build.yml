name: Build DailyTrack APK

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Create Flutter project
        run: |
          flutter create --org id.dailytrack --project-name dailytrack tmp_project
          cp -r tmp_project/android .
          cp -r tmp_project/ios .
          cp -r tmp_project/web .
          cp -r tmp_project/test .
          rm -rf tmp_project

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dailytrack-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
